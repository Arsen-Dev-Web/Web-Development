<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Prototype</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    .clock {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 24px;
    }
    .time {
      font-size: 48px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .date {
      font-size: 24px;
      color: #555;
    }
  </style>
</head>
<body>
  
  <div class="clock">
    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date">Monday, 1 January</div>
  </div>

  <script src="proto.js"></script>
  
</body>
</html>
